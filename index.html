<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <title>Rafey's First Webpage</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
        }
        header {
            padding: 60px 20px;
        }
        h1 {
            font-size: 2.5em;
        }
        p {
            font-size: 1.2em;
        }
        .btn {
            background-color: #00c9a7;
            color: white;
            padding: 12px 24px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
        }
        .btn:hover {
            background-color: #00a389;
        }
        section {
            padding: 40px 20px;
        }
        footer {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<header>
    <h1>Welcome to My Website</h1>
    <p>Built with GitHub Pages 🚀</p>
    <a href="#" class="btn">Explore</a>
</header>

<section>
    <h2>About Me</h2>
    <p>I am learning web development and game design.</p>
</section>

<section>
    <h2>My Projects</h2>
    <p>More projects coming soon!</p>
</section>

<footer>
    <p>© 2026 Your Name</p>
</footer>

</body>
</html>
